<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Întrebare importantă</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
}

h1 {
    text-align: center;
    margin-bottom: 50px;
}

#container {
    position: relative;
    width: 100vw;
    height: 50vh;
}

button {
    position: absolute;
    padding: 15px 30px;
    font-size: 18px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>Vrei să ieși cu mine? 😊</h1>

<div id="container">
    <button id="runawayBtn">Nu</button>
</div>

<script>
const btn = document.getElementById("runawayBtn");
const container = document.getElementById("container");

btn.style.left = "50%";
btn.style.top = "50%";

function moveButton() {
    const maxX = container.clientWidth - btn.offsetWidth;
    const maxY = container.clientHeight - btn.offsetHeight;

    const randomX = Math.random() * maxX;
    const randomY = Math.random() * maxY;

    btn.style.left = randomX + "px";
    btn.style.top = randomY + "px";
}

btn.addEventListener("mouseenter", moveButton);

// Pentru telefoane
btn.addEventListener("touchstart", function(e) {
    e.preventDefault();
    moveButton();
});
</script>

</body>
</html>
